services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    environment:
      TZ: 'Europe/London'
      FTLCONF_webserver_api_password: 'mysecretpassword' # This is just an example, change it to your own password
      FTLCONF_dns_listeningMode: 'ALL'
    volumes:
      - './etc-pihole:/etc/pihole'
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    restart: unless-stopped
    networks:
      servarrnetwork:
        aliases:
          - pihole  # Just use the service name as an alias
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80"  # External port for Pi-hole's web UI

networks:
  servarrnetwork:
    external: true