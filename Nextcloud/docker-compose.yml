services:
  nextcloud-aio-mastercontainer:
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    container_name: nextcloud-aio-mastercontainer
    networks:
      servarrnetwork:
        aliases:
          - nextcloud-aio
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - "/mnt/d/Servers/Dockers/nextcloud/ncdata:/mnt/nextcloud/ncdata"
      # You need to move the docker Disk image location to the drive you want the information stored on (found in settings > resources > advanced)
    ports:
      - 8088:8080
    environment:
      AIO_COMMUNITY_CONTAINERS: "local-ai memories"
      APACHE_PORT: 11000
      FULLTEXTSEARCH_JAVA_OPTIONS: "-Xms1024M -Xmx1024M"
      NEXTCLOUD_DATADIR: /nextcloud/ncdata
      NEXTCLOUD_UPLOAD_LIMIT: 1028G
      NEXTCLOUD_MAX_TIME: 7200
      NEXTCLOUD_MEMORY_LIMIT: 1028M
      NEXTCLOUD_ENABLE_DRI_DEVICE: false
      SKIP_DOMAIN_VALIDATION: false
      TALK_PORT: 3478

networks:
  servarrnetwork:
    external: true

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
